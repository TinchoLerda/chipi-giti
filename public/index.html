<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHIPI GiTi de Momi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rosa: #f0a0c0;
      --rosa-fuerte: #e0609a;
      --rosa-pale: rgba(240,160,192,0.12);
      --acento: #ff3d7f;
      --negro: #0d090b;
      --crema: #fdf4f0;
      --gris: rgba(255,255,255,0.35);
    }

    body {
      background: var(--negro);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      color: var(--crema);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,61,127,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 90%, rgba(240,160,192,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 1rem 1.5rem;
    }

    /* ---- HEADER ---- */
    header {
      text-align: center;
      padding: 2.2rem 0 1.2rem;
    }

    .eyebrow {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rosa);
      opacity: 0.6;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 6rem);
      letter-spacing: 0.05em;
      line-height: 0.88;
      color: var(--crema);
    }

    h1 em {
      color: var(--acento);
      font-style: normal;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--rosa);
      opacity: 0.65;
      margin-top: 0.55rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--acento);
      margin: 1rem auto 0;
      border-radius: 2px;
    }

    /* ---- PILLS DE MODO ---- */
    .modos {
      display: flex;
      gap: 7px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1.2rem 0 0.8rem;
    }

    .modo-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 15px;
      border-radius: 100px;
      border: 1px solid rgba(240,160,192,0.25);
      background: transparent;
      color: rgba(240,160,192,0.6);
      cursor: pointer;
      transition: all 0.18s;
    }

    .modo-btn:hover { border-color: var(--acento); color: var(--acento); }
    .modo-btn.active { background: var(--acento); border-color: var(--acento); color: white; }

    /* ---- CHAT ---- */
    #chat {
      flex: 1;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(240,160,192,0.1);
      border-radius: 20px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 13px;
      min-height: 320px;
      max-height: 430px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(240,160,192,0.15) transparent;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 200px;
    }

    .empty-state p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(240,160,192,0.2);
      font-size: 0.95rem;
      text-align: center;
    }

    /* ---- MENSAJES ---- */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 86%;
      animation: rise 0.28s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.momi { align-self: flex-start; align-items: flex-start; }

    .msg-who {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .msg.user .msg-who { color: rgba(255,255,255,0.3); }
    .msg.momi .msg-who { color: rgba(240,160,192,0.55); }

    .bubble {
      padding: 11px 15px;
      font-size: 14.5px;
      line-height: 1.62;
    }

    .msg.user .bubble {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      border-radius: 16px 16px 4px 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .msg.momi .bubble {
      background: rgba(240,160,192,0.08);
      border: 1px solid rgba(240,160,192,0.18);
      color: var(--crema);
      border-radius: 16px 16px 16px 4px;
    }

    /* intro especial */
    .msg.momi.intro .bubble {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      background: rgba(255,61,127,0.07);
      border-left: 3px solid var(--acento);
      border-top: 1px solid rgba(255,61,127,0.2);
      border-right: 1px solid rgba(255,61,127,0.1);
      border-bottom: 1px solid rgba(255,61,127,0.1);
      border-radius: 0 16px 16px 4px;
    }

    /* typing */
    .typing-row {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: rgba(240,160,192,0.08);
      border: 1px solid rgba(240,160,192,0.15);
      border-radius: 16px 16px 16px 4px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rosa);
      animation: pulse 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.75); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ---- SUGERENCIAS ---- */
    #sugerencias {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0.7rem 0;
    }

    .sug {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid rgba(240,160,192,0.2);
      background: transparent;
      color: rgba(240,160,192,0.6);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .sug:hover { border-color: var(--acento); color: var(--acento); }

    /* ---- INPUT ---- */
    .input-wrap {
      display: flex;
      gap: 9px;
      margin-top: 0.7rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,160,192,0.2);
      border-radius: 14px;
      padding: 12px 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--crema);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 48px;
      max-height: 110px;
      line-height: 1.5;
    }
    textarea::placeholder { color: rgba(240,160,192,0.28); }
    textarea:focus { border-color: rgba(255,61,127,0.45); }

    #sendBtn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 14px;
      border: none;
      background: var(--acento);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    #sendBtn:hover { background: #f0205f; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { background: rgba(255,61,127,0.3); cursor: not-allowed; }

    footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      color: rgba(240,160,192,0.2);
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="eyebrow">Nadie Dice Nada · Luzu TV</div>
    <h1>CHIPI<br><em>GiTi</em></h1>
    <div class="tagline">de Momi</div>
    <div class="divider"></div>
  </header>

  <div class="modos">
    <button class="modo-btn active" data-modo="intro">✨ Frase de intro</button>
    <button class="modo-btn" data-modo="info">Preguntame algo</button>
    <button class="modo-btn" data-modo="libre">Libre</button>
  </div>

  <div id="chat">
    <div class="empty-state">
      <p>Mandame un tema o una pregunta,<br>mi amor...</p>
    </div>
  </div>

  <div id="sugerencias">
    <button class="sug" onclick="usarSug(this)">El miedo al fracaso</button>
    <button class="sug" onclick="usarSug(this)">Procrastinar</button>
    <button class="sug" onclick="usarSug(this)">¿Cuánto mide la Torre Eiffel?</button>
    <button class="sug" onclick="usarSug(this)">Relaciones tóxicas</button>
    <button class="sug" onclick="usarSug(this)">¿Quién inventó internet?</button>
    <button class="sug" onclick="usarSug(this)">Empezar de cero</button>
  </div>

  <div class="input-wrap">
    <textarea id="input" placeholder="Escribí un tema para una intro, o preguntame cualquier cosa..." rows="1"></textarea>
    <button id="sendBtn" onclick="enviar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <footer>CHIPI GiTi · Nadie Dice Nada · Luzu TV</footer>

</div>

<script>
  const MODOS = {
    intro: 'Quiero una FRASE DE INTRODUCCIÓN sobre este tema, al estilo Momi. Solo la frase, nada más. Tema: ',
    info:  '',
    libre: ''
  };

  let modoActual = 'intro';
  let historial = [];
  let esperando = false;

  // Detectar si es frase intro para estilo especial
  function esIntro(texto) {
    return modoActual === 'intro';
  }

  document.querySelectorAll('.modo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      modoActual = btn.dataset.modo;

      const placeholders = {
        intro: 'Escribí un tema para que Momi te haga la intro...',
        info:  'Preguntame cualquier cosa, te doy info garantizada...',
        libre: 'Escribí lo que quieras, mi amor...'
      };
      document.getElementById('input').placeholder = placeholders[modoActual];
    });
  });

  function usarSug(btn) {
    document.getElementById('input').value = btn.textContent;
    enviar();
  }

  function limpiarEmpty() {
    const empty = document.querySelector('.empty-state');
    if (empty) empty.remove();
    document.getElementById('sugerencias').style.display = 'none';
  }

  function agregarMsg(quien, texto, esIntroMsg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + quien + (esIntroMsg ? ' intro' : '');

    const who = document.createElement('div');
    who.className = 'msg-who';
    who.textContent = quien === 'user' ? 'Vos' : 'Momi GPT';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = texto;

    div.appendChild(who);
    div.appendChild(bub);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function agregarTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'typing-row';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function quitarTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function enviar() {
    if (esperando) return;
    const input = document.getElementById('input');
    const texto = input.value.trim();
    if (!texto) return;

    limpiarEmpty();
    input.value = '';
    input.style.height = 'auto';

    const esIntroMsg = esIntro(texto);
    const msgParaApi = MODOS[modoActual] + texto;

    agregarMsg('user', texto, false);
    historial.push({ role: 'user', content: msgParaApi });

    esperando = true;
    document.getElementById('sendBtn').disabled = true;
    agregarTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historial })
      });

      const data = await res.json();
      quitarTyping();

      const respuesta = data.reply || 'Uy, algo salió mal mi amor...';
      historial.push({ role: 'assistant', content: respuesta });
      agregarMsg('momi', respuesta, esIntroMsg);
    } catch(e) {
      quitarTyping();
      agregarMsg('momi', 'Ay no, se me fue el wifi. Igual lo que te iba a decir era re fidedigno, te lo juro.', false);
    }

    esperando = false;
    document.getElementById('sendBtn').disabled = false;
  }

  // Enter para enviar, Shift+Enter para nueva línea
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  // Auto-resize textarea
  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });
</script>
</body>
</html>
